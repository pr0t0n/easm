# Phase: WEAPONIZATION_SIMULATION — payload prep, exploit selection from CVEs.
# These are passive: they reason over recon evidence without attacking.

nuclei_cves:
  tool: nuclei
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  description: "CVE & misconfiguration template-driven scan (8000+ checks)."
  cmd: ["nuclei", "-u", "{url}", "-silent", "-jsonl", "-severity", "critical,high,medium", "-rate-limit", "150"]
  timeout: 900
  parser: jsonl

nmap_vuln_scripts:
  tool: nmap-vulscan
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  description: "Nmap NSE vuln category — maps services to known CVEs."
  cmd: ["nmap", "-sV", "--script", "vuln", "-Pn", "-T4", "{host}"]
  timeout: 900
  parser: raw

nikto_basic:
  tool: nikto
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  # Why these flags:
  #   -ask no           : never prompt for updates (we ignore "Failed to check 403")
  #   -nointeractive    : also blocks interactive prompts
  #   -maxtime 480s     : finish before the 900s kali_runner client timeout, leaving
  #                       slack for parse+upload; longer scans get truncated anyway
  #   -Tuning 123bde    : 1=Interesting Files, 2=Misconfig, 3=Info Disclosure,
  #                       b=Software ID, d=Remote File Inclusion, e=Remote Source
  #                       (intentionally omits 8/9 which target SQLi/XSS — those are
  #                        done by sqlmap/dalfox; nikto here is for the header/CGI side)
  #   -Plugins '@@DEFAULT;-update' : skip the slow update check that returns 403
  # We DO NOT pass `-Display V` — the verbose mode produced 215KB+ of "404 for GET"
  # log lines that overflowed the 100K runner stdout cap and pushed real findings
  # (lines starting with `+`) out of the parser window. Default display already
  # prints `+` finding lines.
  cmd: ["nikto", "-h", "{url}", "-ask", "no", "-nointeractive", "-maxtime", "480s",
        "-Tuning", "123bde", "-Plugins", "@@DEFAULT;-update"]
  timeout: 900
  parser: raw
  allowed_return_codes: [0, 1]

shodan_lookup:
  tool: shodan-cli
  category: osint
  phase: WEAPONIZATION_SIMULATION
  description: "Shodan host lookup — banners, exposed services."
  cmd: ["shodan", "host", "{host}"]
  requires_env: ["SHODAN_API_KEY"]
  timeout: 60
  parser: raw

theharvester_passive:
  tool: theHarvester
  category: osint
  phase: WEAPONIZATION_SIMULATION
  description: "Email/host gathering from public sources."
  cmd: ["theHarvester", "-d", "{host}", "-b", "duckduckgo,crtsh,hackertarget,bing,otx", "-l", "200"]
  timeout: 300
  parser: raw

h8mail_breach:
  tool: h8mail
  category: osint
  phase: WEAPONIZATION_SIMULATION
  description: "Email leak hunter (HIBP integration)."
  cmd: ["h8mail", "-t", "{host}"]
  timeout: 120
  parser: raw

trufflehog_secrets:
  tool: trufflehog
  category: code
  phase: WEAPONIZATION_SIMULATION
  description: "Verified secret scanner — works on URL/git/S3."
  cmd: ["trufflehog", "filesystem", "--no-update", "--json", "."]
  timeout: 600
  parser: jsonl
