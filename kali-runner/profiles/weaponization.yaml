# Phase: WEAPONIZATION_SIMULATION — payload prep, exploit selection from CVEs.
# These are passive: they reason over recon evidence without attacking.

nuclei_cves:
  tool: nuclei
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  description: "CVE & misconfiguration template-driven scan (8000+ checks)."
  cmd: ["nuclei", "-u", "{url}", "-silent", "-jsonl", "-severity", "critical,high,medium", "-rate-limit", "150"]
  timeout: 900
  parser: jsonl

# Batch variant: scan multiple URLs in a single nuclei run.
# Eliminates template-loading overhead (10-30s startup per run) paid once for all targets.
nuclei_cves_batch:
  tool: nuclei
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  target_type: targets_file
  description: "Batch nuclei CVE/misconfiguration scan across multiple URLs."
  cmd: ["nuclei", "-list", "{target_file}", "-silent", "-jsonl",
        "-severity", "critical,high,medium", "-rate-limit", "200",
        "-bulk-size", "25", "-concurrency", "25"]
  timeout: 1200
  parser: jsonl

nmap_vuln_scripts:
  tool: nmap-vulscan
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  description: "Nmap NSE vuln category — maps detected services to known CVEs (article §8: nmap --script vuln)."
  # Article: 'nmap --script vuln example.com'. We add -sV to ensure scripts have
  # service context, --top-ports 200 to bound runtime, -T4 aggressive timing,
  # --max-retries 2 to avoid hanging on filtered ports.
  cmd: ["nmap", "-sV", "--script", "vuln", "-Pn", "-T4",
        "--top-ports", "200", "--max-retries", "2", "{host}"]
  timeout: 900
  parser: raw

# Batch variant: nmap vuln scripts across a list of hosts.
# nmap processes all hosts in parallel (-T4, internal parallelism).
nmap_vuln_scripts_batch:
  tool: nmap-vulscan
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  target_type: targets_file
  description: "Batch nmap NSE vuln scan across multiple hosts via -iL."
  cmd: ["nmap", "-sV", "--script", "vuln", "-Pn", "-T4",
        "--top-ports", "100", "--max-retries", "1", "--open",
        "-oG", "-", "-iL", "{target_file}"]
  timeout: 1200
  parser: raw

nmap_http_enum:
  tool: nmap-http-enum
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  description: "NSE http-enum + http-vuln-* scripts — discovers admin panels, default creds, known CVEs over HTTP."
  # NSE scripts targeting common HTTP misconfigurations and CVEs. Faster than
  # full --script vuln when target is known to be HTTP-only.
  cmd: ["nmap", "-sV", "-Pn", "-T4", "-p", "80,443,8080,8443,8000,8888",
        "--script", "http-enum,http-title,http-headers,http-methods,http-vuln-cve2017-5638,http-vuln-cve2017-1001000,http-shellshock,http-slowloris-check,http-stored-xss,http-sql-injection,http-cors,http-trace,http-auth,http-default-accounts",
        "--script-args", "http.useragent=Mozilla/5.0",
        "{host}"]
  timeout: 900
  parser: raw

nmap_smb_vuln:
  tool: nmap-smb-vuln
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  description: "NSE SMB vuln scan — EternalBlue (MS17-010), Conficker, SambaCry, null sessions."
  # Useful when port 445/139 is detected. Skipped automatically by the supervisor
  # for plain web targets via require_scheme / requires_port heuristics.
  cmd: ["nmap", "-Pn", "-T4", "-p", "139,445",
        "--script", "smb-vuln-ms17-010,smb-vuln-conficker,smb-vuln-cve-2017-7494,smb-vuln-ms08-067,smb-os-discovery,smb-enum-shares,smb-enum-users",
        "{host}"]
  timeout: 600
  parser: raw

nmap_dns_vuln:
  tool: nmap-dns-vuln
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  description: "NSE DNS recursion / cache snooping / zone-transfer / dns-fuzz."
  # Only useful when port 53 (DNS) is actually open. Without --max-rtt-timeout
  # on a target without DNS, nmap UDP waits the full timeout per probe.
  requires_ports: [53]
  cmd: ["nmap", "-sU", "-sV", "-Pn", "-p", "53",
        "--max-rtt-timeout", "500ms", "--max-retries", "1",
        "--script", "dns-recursion,dns-cache-snoop,dns-zone-transfer,dns-nsid",
        "{host}"]
  timeout: 120
  parser: raw
  allowed_return_codes: [0, 1]

nmap_ssh_audit:
  tool: nmap-ssh-audit
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  description: "NSE SSH auth method discovery + algorithm audit (weak ciphers/HostKey)."
  cmd: ["nmap", "-sV", "-Pn", "-T4", "-p", "22",
        "--script", "ssh-auth-methods,ssh2-enum-algos,ssh-hostkey,ssh-publickey-acceptance",
        "{host}"]
  timeout: 300
  parser: raw
  allowed_return_codes: [0, 1]

nmap_ssl_vuln:
  tool: nmap-ssl-vuln
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  description: "NSE SSL/TLS vuln battery — Heartbleed, POODLE, BEAST, CCS, DROWN."
  requires_scheme: ["https"]
  cmd: ["nmap", "-sV", "-Pn", "-T4", "-p", "443,8443",
        "--script", "ssl-heartbleed,ssl-poodle,ssl-ccs-injection,ssl-dh-params,ssl-enum-ciphers,sslv2-drown",
        "{host}"]
  timeout: 600
  parser: raw

nikto_basic:
  tool: nikto
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  # Tuning categories (all active):
  #   1=Interesting Files, 2=Misconfig, 3=Info Disclosure
  #   4=XSS/Injection (complementar a dalfox — payloads diferentes)
  #   5=Remote File Retrieval (webroot), 7=Server-wide retrieval
  #   8=Command Execution, 9=SQL Injection
  #   a=Auth Bypass, b=Software ID, c=Remote Source Inclusion
  #   d=WebService, e=Admin Console
  # -Plugins '@@DEFAULT;-update' : skip slow update check (returns 403)
  # Sem -maxtime: nikto roda até completar todos os checks. O timeout do wrapper
  # (3600s) é o único limite — só mata se travar completamente.
  cmd: ["nikto", "-h", "{url}", "-ask", "no", "-nointeractive",
        "-Tuning", "12345789abcde", "-Plugins", "@@DEFAULT;-update"]
  timeout: 3600
  parser: raw
  allowed_return_codes: [0, 1]

shodan_lookup:
  tool: shodan-cli
  category: osint
  phase: WEAPONIZATION_SIMULATION
  description: "Shodan host lookup — banners, ports, CVEs (uses bundled wrapper script to avoid template interpolation issues)."
  cmd: ["/opt/tools/pipx/venvs/shodan/bin/python", "/opt/runner-scripts/shodan_lookup.py", "{host}"]
  requires_env: ["SHODAN_API_KEY"]
  timeout: 60
  parser: json

theharvester_passive:
  tool: theHarvester
  category: osint
  phase: WEAPONIZATION_SIMULATION
  description: "Email/host gathering from public sources."
  target_type: domain
  cmd: ["theHarvester", "-d", "{{domain}}", "-b", "duckduckgo,crtsh,hackertarget,otx,yahoo", "-l", "200", "-f", "{{out}}/theharvester"]
  timeout: 300
  parser: raw

h8mail_breach:
  tool: h8mail
  category: osint
  phase: WEAPONIZATION_SIMULATION
  description: "Email breach lookup for harvested accounts. Requires configured providers for enriched results."
  cmd: ["h8mail", "-t", "{target}"]
  timeout: 180
  parser: raw
  allowed_return_codes: [0, 1]

# === HackerOne-derived nuclei template profiles (weaponization phase) ===
# Covers vulnerability classes ranked medium–critical in HackerOne data:
# RCE/Command Injection, Auth/Default Creds, JWT/OAuth, Info Disclosure,
# Cloud/S3, Deserialization, Clickjacking, Security Headers.

nuclei_rce:
  tool: nuclei
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  description: "Nuclei RCE/command injection templates — critical severity only (HackerOne injection class: 135 reports)."
  cmd: ["nuclei", "-u", "{url}", "-silent", "-jsonl",
        "-tags", "rce,command-injection,code-injection,os-command-injection",
        "-severity", "critical,high", "-rate-limit", "50"]
  timeout: 600
  parser: jsonl

nuclei_auth:
  tool: nuclei
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  description: "Nuclei auth/default-credentials templates — broken auth, default logins, 2FA bypass (119 HackerOne reports)."
  cmd: ["nuclei", "-u", "{url}", "-silent", "-jsonl",
        "-tags", "auth,authentication,default-login,default-credentials,auth-bypass,2fa-bypass",
        "-rate-limit", "60"]
  timeout: 600
  parser: jsonl

nuclei_jwt:
  tool: nuclei
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  description: "Nuclei JWT/OAuth templates — alg:none, weak HS256, token leak, OAuth state bypass (19 HackerOne reports)."
  cmd: ["nuclei", "-u", "{url}", "-silent", "-jsonl",
        "-tags", "jwt,oauth,oauth2,token",
        "-rate-limit", "80"]
  timeout: 300
  parser: jsonl

nuclei_exposure:
  tool: nuclei
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  description: "Nuclei information/secret exposure templates — API keys, tokens, stack traces, debug endpoints (78 HackerOne reports)."
  cmd: ["nuclei", "-u", "{url}", "-silent", "-jsonl",
        "-tags", "exposure,token,api-key,secret,debug,stack-trace,config-exposure",
        "-rate-limit", "100"]
  timeout: 600
  parser: jsonl

nuclei_cloud:
  tool: nuclei
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  description: "Nuclei cloud/S3 exposure templates — open buckets, AWS metadata, GCP/Azure exposure (15 HackerOne reports)."
  cmd: ["nuclei", "-u", "{url}", "-silent", "-jsonl",
        "-tags", "s3,cloud,aws,gcp,azure,bucket,instance-metadata,ec2-metadata",
        "-rate-limit", "80"]
  timeout: 300
  parser: jsonl

nuclei_deserialization:
  tool: nuclei
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  description: "Nuclei deserialization templates — Java, PHP, Python unsafe deserialize (13 HackerOne reports)."
  cmd: ["nuclei", "-u", "{url}", "-silent", "-jsonl",
        "-tags", "deserialization,insecure-deserialization,unsafe-deserialization",
        "-severity", "critical,high", "-rate-limit", "50"]
  timeout: 300
  parser: jsonl

nuclei_clickjacking:
  tool: nuclei
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  description: "Nuclei clickjacking templates — missing X-Frame-Options, CSP frame-ancestors bypass (19 HackerOne reports)."
  cmd: ["nuclei", "-u", "{url}", "-silent", "-jsonl",
        "-tags", "clickjacking,xfo,x-frame-options",
        "-rate-limit", "100"]
  timeout: 300
  parser: jsonl

nuclei_headers:
  tool: nuclei
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  description: "Nuclei missing security headers — CSP, HSTS, X-Content-Type-Options, DMARC/SPF/DKIM (27 HackerOne reports)."
  cmd: ["nuclei", "-u", "{url}", "-silent", "-jsonl",
        "-tags", "headers,missing-headers,security-misconfiguration,csp,hsts,dmarc,spf",
        "-rate-limit", "100"]
  timeout: 300
  parser: jsonl

nuclei_spoofing:
  tool: nuclei
  category: vuln
  phase: WEAPONIZATION_SIMULATION
  description: "Nuclei spoofing/impersonation templates — email spoofing via missing SPF/DMARC, content spoofing (53 HackerOne reports)."
  cmd: ["nuclei", "-u", "{url}", "-silent", "-jsonl",
        "-tags", "spoofing,email-spoofing,content-spoofing,spf,dmarc,dkim",
        "-rate-limit", "100"]
  timeout: 300
  parser: jsonl
