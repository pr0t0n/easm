# Phase: RECONNAISSANCE — passive/active surface mapping
# Each profile = one well-tuned tool invocation. cmd uses {target} substitution.

subfinder_passive:
  tool: subfinder
  category: recon
  phase: RECONNAISSANCE
  description: "Passive subdomain enumeration via ALL 30+ data sources (CT logs, DNS-DB, certspotter, virustotal, etc)."
  # `-all` enables every source (article: 'subfinder -d X -all -o sub.txt')
  cmd: ["subfinder", "-d", "{host}", "-all", "-silent", "-t", "100"]
  timeout: 240
  parser: lines

amass_enum:
  tool: amass
  category: recon
  phase: RECONNAISSANCE
  description: "Passive subdomain enumeration via amass (CT logs, DNS DB, OSINT). For brute use amass_brute."
  target_type: domain
  cmd: ["amass", "enum", "-passive", "-d", "{{domain}}", "-timeout", "10", "-o", "{{out}}/amass.txt"]
  timeout: 300
  parser: lines

amass_brute:
  tool: amass-brute
  category: recon
  phase: RECONNAISSANCE
  description: "Active amass brute-force DNS enumeration — resolver file (-rf) + SecLists wordlist."
  # amass v4: -r expects ONE resolver IP (repeatable); a comma list fails with
  # 'unable to build pool of untrusted resolvers'. Use -rf <file> instead.
  cmd: ["amass", "enum", "-brute", "-d", "{host}",
        "-w", "/usr/share/seclists/Discovery/DNS/subdomains-top1million-20000.txt",
        "-rf", "/usr/share/seclists/Miscellaneous/dns-resolvers.txt",
        "-timeout", "10"]
  timeout: 900
  parser: lines

amass_intel:
  tool: amass-intel
  category: recon
  phase: RECONNAISSANCE
  description: "OSINT mode: WHOIS-based + reverse WHOIS + ASN-based domain discovery."
  # Article: 'amass intel -src -d X' / 'amass intel -d X -whois'
  cmd: ["amass", "intel", "-d", "{host}", "-whois", "-timeout", "5"]
  # amass intel exits 1 when reverse-WHOIS yields no related domains — that is
  # 'no findings', not a failure. Accept it so the phase isn't marked failed.
  allowed_return_codes: [0, 1]
  timeout: 300
  parser: lines

sublist3r_basic:
  tool: sublist3r
  category: recon
  phase: RECONNAISSANCE
  description: "Subdomain enum via search engines (Google, Bing, Yahoo, Virustotal, Netcraft). Second opinion to subfinder/amass."
  # Article section 2: 'sublist3r -d example.com'. Output is plain stdout.
  cmd: ["sublist3r", "-d", "{host}", "-v", "-t", "20"]
  timeout: 300
  parser: lines

ghdb_public_indexes:
  tool: ghdb-public-indexes
  category: recon
  phase: RECONNAISSANCE
  description: "GHDB-style public index discovery via crt.sh, urlscan, OTX, HackerTarget and RapidDNS."
  cmd: ["python3", "/opt/runner-scripts/ghdb_public_index_subdomains.py", "{host}", "--limit", "5000"]
  timeout: 240
  parser: lines

findomain_passive:
  tool: findomain
  category: recon
  phase: RECONNAISSANCE
  description: "Findomain — fast passive subdomain enum from cert transparency + DB sources."
  cmd: ["findomain", "-t", "{host}", "--quiet"]
  timeout: 180
  parser: lines

dnsrecon_brute:
  tool: dnsrecon-brt
  category: recon
  phase: RECONNAISSANCE
  description: "DNS brute force using common subdomain wordlist (-t brt)."
  # Article section 4: 'dnsrecon -d X -t brt'
  cmd: ["dnsrecon", "-d", "{host}", "-t", "brt",
        "-D", "/usr/share/seclists/Discovery/DNS/subdomains-top1million-5000.txt",
        "--threads", "20"]
  timeout: 600
  parser: lines
  allowed_return_codes: [0, 1]

dnsrecon_zone_transfer:
  tool: dnsrecon-zt
  category: recon
  phase: RECONNAISSANCE
  description: "DNS zone transfer attempt (axfr). Rare success = jackpot."
  # Article section 4: 'dnsrecon -d X -t zt'
  cmd: ["dnsrecon", "-d", "{host}", "-t", "axfr"]
  timeout: 60
  parser: lines
  allowed_return_codes: [0, 1]

dnsenum_basic:
  tool: dnsenum
  category: recon
  phase: RECONNAISSANCE
  description: "Multipurpose DNS discovery (NS, MX, AXFR attempt, brute, reverse). Quick DNS insights."
  # Article section 5: 'dnsenum example.com'
  cmd: ["dnsenum", "--noreverse", "--nocolor", "-t", "5", "{host}"]
  timeout: 300
  parser: lines
  allowed_return_codes: [0, 1, 2]

assetfinder_passive:
  tool: assetfinder
  category: recon
  phase: RECONNAISSANCE
  description: "Quick passive subdomain finder (CT logs + Wayback)."
  cmd: ["assetfinder", "--subs-only", "{host}"]
  timeout: 60
  parser: lines

dnsx_resolve:
  tool: dnsx
  category: recon
  phase: RECONNAISSANCE
  description: "Multi-purpose DNS toolkit (A, AAAA, CNAME, NS, MX)."
  cmd: ["dnsx", "-a", "-aaaa", "-cname", "-ns", "-mx", "-resp", "-silent"]
  stdin_template: "{host}\n"
  timeout: 120
  parser: lines

# Batch variant: resolve a list of hosts at once (-l flag).
# Used after subfinder to bulk-validate all discovered subdomains in one shot.
dnsx_resolve_batch:
  tool: dnsx
  category: recon
  phase: RECONNAISSANCE
  target_type: targets_file
  description: "Batch DNS resolution for a list of discovered subdomains."
  cmd: ["dnsx", "-l", "{target_file}", "-a", "-aaaa", "-cname", "-resp", "-silent",
        "-t", "100"]
  timeout: 120
  parser: lines

shuffledns_brute:
  tool: shuffledns
  category: recon
  phase: RECONNAISSANCE
  description: "Active subdomain bruteforce + wildcard filter."
  cmd: ["shuffledns", "-d", "{host}", "-silent", "-mode", "bruteforce", "-r", "/usr/share/seclists/Miscellaneous/dns-resolvers.txt", "-w", "/usr/share/seclists/Discovery/DNS/subdomains-top1million-110000.txt"]
  timeout: 600
  parser: lines

alterx_permutations:
  tool: alterx
  category: recon
  phase: RECONNAISSANCE
  description: "Pattern-based subdomain permutation generator."
  cmd: ["alterx", "-l", "{host}", "-silent"]
  timeout: 60
  parser: lines

naabu_top1000:
  tool: naabu
  category: recon
  phase: RECONNAISSANCE
  description: "Fast TCP port scan top-1000 (article §1 subfinder | naabu pipeline equivalent)."
  cmd: ["naabu", "-host", "{host_ip}", "-top-ports", "1000", "-silent", "-rate", "1000"]
  timeout: 600
  parser: lines

# Batch variant: scan a list of hosts in a single naabu run.
# Requires targets list via POST /jobs targets=[]. Outputs host:port lines.
naabu_top1000_batch:
  tool: naabu
  category: recon
  phase: RECONNAISSANCE
  target_type: targets_file
  description: "Batch TCP port scan top-1000 across multiple hosts in one run."
  cmd: ["naabu", "-list", "{target_file}", "-top-ports", "1000", "-silent", "-rate", "2000", "-c", "50"]
  timeout: 600
  parser: lines

nmap_service_detect:
  tool: nmap
  category: recon
  phase: RECONNAISSANCE
  description: "Bounded ASM service/version discovery for the P02 gate. Deeper NSE scripts run in later vulnerability phases."
  # P02 is a gate for crawling/fingerprinting. Keep it fast and bounded on
  # public/WAF targets; heavyweight NSE checks belong to P09/P11/P18.
  cmd: ["nmap", "-sV", "--version-light", "-Pn", "--open", "--top-ports", "200", "-T4",
        "--max-retries", "1", "--max-rtt-timeout", "2s", "--host-timeout", "240s", "{host}"]
  timeout: 300
  parser: raw

# Batch variant: one nmap run across multiple hosts from a file.
# Much faster than N sequential runs; nmap parallelises internally per host.
nmap_service_detect_batch:
  tool: nmap
  category: recon
  phase: RECONNAISSANCE
  target_type: targets_file
  description: "Bounded batch service detection across multiple hosts via -iL."
  cmd: ["nmap", "-sV", "--version-light", "-Pn", "--top-ports", "200", "-T4",
        "--max-retries", "1", "--max-rtt-timeout", "2s", "--host-timeout", "240s",
        "--open", "-oG", "-", "-iL", "{target_file}"]
  timeout: 300
  parser: raw

masscan_full:
  tool: masscan
  category: recon
  phase: RECONNAISSANCE
  description: "Internet-scale stateless TCP port scanner — full 1-65535 (article §10)."
  target_type: resolved_ip
  cmd: ["masscan", "{{host_ip}}", "-p1-65535", "--rate", "5000", "--wait", "3"]
  timeout: 900
  parser: raw

httpx_probe:
  tool: httpx
  category: recon
  phase: RECONNAISSANCE
  description: "Live HTTP/HTTPS prober with status, title, tech, TLS (article §6: alive/dead check)."
  # Article: 'httpx -threads 100 -l subs.txt' uses list mode + threads. We are
  # single-target here; -follow-redirects + -no-color + -tls-probe + -json keep
  # the parser happy. -fr ensures redirects don't hide the real status.
  cmd: ["httpx", "-u", "{url}", "-silent",
        "-status-code", "-title", "-tech-detect", "-tls-probe",
        "-follow-redirects", "-no-color", "-json",
        "-threads", "15", "-rate-limit", "40"]
  timeout: 180
  parser: jsonl

# Batch variant: probe a list of hosts/URLs in one httpx run (100 threads).
# The canonical pipeline pattern: `subfinder | httpx -l subs.txt`.
httpx_probe_batch:
  tool: httpx
  category: recon
  phase: RECONNAISSANCE
  target_type: targets_file
  description: "Batch HTTP/HTTPS prober: one run for all discovered hosts."
  cmd: ["httpx", "-l", "{target_file}", "-silent",
        "-status-code", "-title", "-tech-detect", "-tls-probe",
        "-follow-redirects", "-no-color", "-json", "-include-response-header",
        "-threads", "100", "-rate-limit", "150"]
  timeout: 300
  parser: jsonl

whatweb_fingerprint:
  tool: whatweb
  category: recon
  phase: RECONNAISSANCE
  description: "Web tech fingerprint (CMS, frameworks, JS libs)."
  # '--log-json=-' makes whatweb's Ruby logger write to a stdout stream the
  # runner already owns → 'closed stream (IOError)'. Use the default verbose
  # stdout output (parser: raw) instead — it is fully parseable.
  cmd: ["whatweb", "--no-errors", "-a", "3", "--colour=never", "{url}"]
  timeout: 120
  parser: raw

wafw00f_detect:
  tool: wafw00f
  category: recon
  phase: RECONNAISSANCE
  description: "WAF detector — 100+ vendors."
  cmd: ["wafw00f", "{url}"]
  timeout: 60
  parser: raw

sslscan_audit:
  tool: sslscan
  category: recon
  phase: RECONNAISSANCE
  description: "TLS cipher / cert audit."
  requires_scheme: ["https"]
  cmd: ["sslscan", "--no-colour", "{netloc}"]
  timeout: 120
  parser: raw

testssl_audit:
  tool: testssl
  category: recon
  phase: RECONNAISSANCE
  description: "Comprehensive TLS auditor (vulns, ciphers, HSTS, OCSP)."
  requires_scheme: ["https"]
  cmd: ["testssl", "--quiet", "--color", "0", "{netloc}"]
  timeout: 600
  parser: raw

katana_crawl:
  tool: katana
  category: recon
  phase: RECONNAISSANCE
  description: "Headless+passive crawler with JS parser."
  cmd: ["katana", "-u", "{url}", "-silent", "-d", "3", "-jc", "-kf", "all"]
  timeout: 300
  parser: lines

hakrawler_crawl:
  tool: hakrawler
  category: recon
  phase: RECONNAISSANCE
  description: "Fast Go web crawler — pulls links from JS, robots, sitemaps."
  cmd: ["hakrawler", "-d", "3", "-u"]
  stdin_template: "{url}\n"
  timeout: 180
  parser: lines

gospider_crawl:
  tool: gospider
  category: recon
  phase: RECONNAISSANCE
  description: "Web spider with form/sitemap detection."
  cmd: ["gospider", "-s", "{url}", "-d", "3", "-c", "5", "--quiet"]
  allowed_return_codes: [0, 1]
  timeout: 300
  parser: lines

gau_archives:
  tool: gau
  category: recon
  phase: RECONNAISSANCE
  description: "GetAllUrls — archived URLs from Wayback/CommonCrawl/AlienVault."
  cmd: ["gau", "{host}", "--threads", "5"]
  timeout: 180
  parser: lines

waybackurls_archives:
  tool: waybackurls
  category: recon
  phase: RECONNAISSANCE
  description: "Wayback Machine URL extractor."
  cmd: ["waybackurls", "{host}"]
  timeout: 120
  parser: lines

arjun_param_discover:
  tool: arjun
  category: recon
  phase: RECONNAISSANCE
  description: "Hidden HTTP parameter discoverer (GET/POST/JSON)."
  # -t 10 threads + rate-limit 20: completes the small quick-params list well
  # within the 180s wrapper so it exits 'completed' instead of being killed
  # (= 'timeout'). -T 4 per-request timeout rides out slow WAF responses.
  cmd: ["arjun", "-u", "{url}", "-w", "/app/profiles/quick-params.txt", "--stable", "-t", "10", "-T", "4", "-c", "20", "--rate-limit", "20"]
  timeout: 180
  parser: raw

paramspider_mining:
  tool: paramspider
  category: recon
  phase: RECONNAISSANCE
  description: "Mines URLs from Wayback to extract param names."
  cmd: ["paramspider", "-d", "{host}"]
  timeout: 180
  parser: lines

linkfinder_js:
  tool: linkfinder
  category: recon
  phase: RECONNAISSANCE
  description: "Extrai endpoints/rotas de API de bundles JS (P08)."
  # -i aceita URL; -o cli imprime endpoints (um por linha) no stdout.
  # -d (domain mode) é OBRIGATÓRIO para SPAs: sem ele, linkfinder só analisa o
  # HTML da própria URL (que numa SPA é só <script src="main.js"> etc — zero
  # endpoints reais). Com -d ele busca e analisa os bundles JS referenciados
  # (main.js, vendor.js...), onde as rotas/params de verdade (ex.: /rest/
  # products/search?q=) estão. Sem isso, P03/P04 nunca veem esses parâmetros
  # e P10/P12 (sqlmap/dalfox) nunca os testam.
  cmd: ["linkfinder", "-d", "-i", "{url}", "-o", "cli"]
  timeout: 180
  parser: lines

curl_headers:
  tool: curl-headers
  category: recon
  phase: RECONNAISSANCE
  description: "HTTP header inspection (security headers, server, WAF hints)."
  target_type: url
  # --max-time 60: WAF/CDN-fronted targets (Incapsula, Cloudflare) are slow;
  # 30s caused curl exit 28 (operation timeout). -A spoofs a browser UA so
  # bot-filtering WAFs don't drop the request. --max-redirs 5 bounds WAF
  # redirect loops; exit 47 (max redirects) is accepted — we still captured
  # the response headers along the chain.
  cmd: ["curl", "-sS", "-I", "-L", "--max-time", "60", "--max-redirs", "5",
        "-A", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
        "{{url}}"]
  allowed_return_codes: [0, 47]
  timeout: 90
  parser: raw

curl_probe:
  tool: curl
  category: http_validation
  phase: DELIVERY_MAPPING
  description: "Full HTTP request — status line, headers and body — for validation."
  target_type: url
  cmd: ["curl", "-sk", "-i", "-L", "--max-time", "60", "--max-redirs", "5",
        "-A", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
        "{{url}}"]
  allowed_return_codes: [0, 47]
  timeout: 90
  parser: raw

# Domain Takeover check: runs against subdomains with dangling DNS records.
# subjack detects CNAMEs pointing to unclaimed services (GitHub Pages, S3, Heroku, etc.).
domain_takeover_check:
  tool: subjack
  category: recon
  phase: RECONNAISSANCE
  target_type: domain
  description: "Dangling DNS / domain takeover detection — CNAME points to unclaimed service."
  cmd: ["subjack", "-d", "{host}", "-t", "20", "-timeout", "30", "-ssl", "-v"]
  timeout: 120
  parser: raw

# Batch variant: check all discovered (including dead) subdomains for takeover via file.
domain_takeover_batch:
  tool: subjack
  category: recon
  phase: RECONNAISSANCE
  target_type: targets_file
  description: "Batch domain takeover check across all discovered subdomains (live + dead)."
  cmd: ["subjack", "-w", "{target_file}", "-t", "50", "-timeout", "30", "-ssl", "-v", "-c", "/usr/share/subjack/fingerprints.json"]
  timeout: 600
  parser: raw

# Nuclei takeover templates — complement subjack with template-based detection.
# Covers HubSpot, StatusPage, GitHub Pages, S3, Heroku, Fastly, Pantheon, etc.
# (49 HackerOne subdomain takeover reports)
nuclei_takeover:
  tool: nuclei
  category: recon
  phase: RECONNAISSANCE
  description: "Nuclei subdomain takeover templates — dangling CNAME, unclaimed services, fingerprint-based detection."
  cmd: ["nuclei", "-u", "{url}", "-silent", "-jsonl",
        "-tags", "takeover,subdomain-takeover,dns-takeover",
        "-rate-limit", "100"]
  timeout: 300
  parser: jsonl
