version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: easm_postgres
    environment:
      POSTGRES_DB: easm
      POSTGRES_USER: easm
      POSTGRES_PASSWORD: easm
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    profiles: ["dev", "prod"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easm -d easm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: easm_redis
    ports:
      - "6379:6379"
    profiles: ["dev", "prod"]
    environment:
      TZ: America/Sao_Paulo

  ollama:
    image: ollama/ollama:latest
    container_name: easm_ollama
    ports:
      - "11434:11434"
    profiles: ["dev", "prod"]
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 10g
        reservations:
          memory: 8g
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_NUM_GPU: "0"
      TZ: America/Sao_Paulo

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_backend
    command: >
      sh -c "alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    ports:
      - "8000:8000"
    profiles: ["dev"]
    volumes:
      - ./backend:/app

  backend_prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_backend_prod
    command: >
      sh -c "alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
    profiles: ["prod"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────────
  # Worker UNITARIO — processa scans manuais/pontuais (POST /api/scans)
  #   Fila principal : scan.unit
  #   Filas de tools : worker.unit.recon, worker.unit.crawler, worker.unit.fuzzing,
  #                    worker.unit.vuln, worker.unit.code_js, worker.unit.api,
  #                    worker.unit.osint
  #   Perfil         : alta prioridade, concurrency=1, turnaround rapido
  # ──────────────────────────────────────────────────────────────────────────────
  worker_unit:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_worker_unit
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=INFO
      --concurrency=1
      --queues=scan.unit,worker.unit.recon,worker.unit.crawler,worker.unit.fuzzing,worker.unit.vuln,worker.unit.code_js,worker.unit.api,worker.unit.osint
      --hostname=worker-unit@%h
    env_file:
      - .env
    environment:
      WORKER_MODE: unit
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./backend:/app

  worker_unit_prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_worker_unit_prod
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=INFO
      --concurrency=1
      --queues=scan.unit,worker.unit.recon,worker.unit.crawler,worker.unit.fuzzing,worker.unit.vuln,worker.unit.code_js,worker.unit.api,worker.unit.osint
      --hostname=worker-unit-prod@%h
    env_file:
      - .env
    environment:
      WORKER_MODE: unit
      TZ: America/Sao_Paulo
    profiles: ["prod"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend_prod:
        condition: service_started
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────────
  # Worker AGENDADO — processa scans periodicos/batch (ScheduledScan)
  #   Fila principal : scan.scheduled
  #   Filas de tools : worker.scheduled.recon, worker.scheduled.crawler,
  #                    worker.scheduled.fingerprint, worker.scheduled.fuzzing,
  #                    worker.scheduled.vuln, worker.scheduled.code_js,
  #                    worker.scheduled.api, worker.scheduled.osint
  #   Perfil         : prioridade normal, concurrency=2, cobertura completa
  # ──────────────────────────────────────────────────────────────────────────────
  worker_scheduled:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_worker_scheduled
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=INFO
      --concurrency=2
      --queues=scan.scheduled,worker.scheduled.recon,worker.scheduled.crawler,worker.scheduled.fingerprint,worker.scheduled.fuzzing,worker.scheduled.vuln,worker.scheduled.code_js,worker.scheduled.api,worker.scheduled.osint
      --hostname=worker-scheduled@%h
    env_file:
      - .env
    environment:
      WORKER_MODE: scheduled
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./backend:/app

  worker_scheduled_prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_worker_scheduled_prod
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=INFO
      --concurrency=2
      --queues=scan.scheduled,worker.scheduled.recon,worker.scheduled.crawler,worker.scheduled.fingerprint,worker.scheduled.fuzzing,worker.scheduled.vuln,worker.scheduled.code_js,worker.scheduled.api,worker.scheduled.osint
      --hostname=worker-scheduled-prod@%h
    env_file:
      - .env
    environment:
      WORKER_MODE: scheduled
      TZ: America/Sao_Paulo
    profiles: ["prod"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend_prod:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: easm_frontend
    environment:
      VITE_API_URL: http://localhost:8000
      TZ: America/Sao_Paulo
    depends_on:
      backend:
        condition: service_started
    profiles: ["dev"]
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  frontend_prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: easm_frontend_prod
    command: ["npm", "run", "preview"]
    environment:
      VITE_API_URL: http://localhost:8000
      TZ: America/Sao_Paulo
    profiles: ["prod"]
    depends_on:
      backend_prod:
        condition: service_started
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
