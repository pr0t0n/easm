x-optional-env-file: &optional_env_file
  - path: ./.env
    required: false

services:
  # ─────────────────────────────────────────────────────────────────
  # Infrastructure: Database, Cache, LLM
  # ─────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: pentest_postgres
    environment:
      POSTGRES_DB: easm
      POSTGRES_USER: easm
      POSTGRES_PASSWORD: easm
      TZ: America/Sao_Paulo
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    profiles: ["dev", "prod"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pentest_redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    profiles: ["dev", "prod"]
    environment:
      TZ: America/Sao_Paulo

  ollama:
    image: ollama/ollama:latest
    container_name: pentest_ollama
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    profiles: ["dev", "prod"]
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 10g
        reservations:
          memory: 8g
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_NUM_GPU: "0"
      TZ: America/Sao_Paulo

  burp_rest:
    image: eclipse-temurin:21
    container_name: pentest_burp_rest
    profiles: ["dev", "prod"]
    env_file: *optional_env_file
    environment:
      BURP_LICENSE_KEY: "${BURP_LICENSE_KEY:-}"
      TZ: America/Sao_Paulo
    command: >
      sh -lc '
        set -e;
        test -f /burp/burpsuite_pro.jar || { echo "Missing /burp/burpsuite_pro.jar" >&2; exit 1; };
        test -f /burp/burp-rest-api-2.3.2.jar || { echo "Missing /burp/burp-rest-api-2.3.2.jar" >&2; exit 1; };
        test -n "$${BURP_LICENSE_KEY:-}" || { echo "Missing BURP_LICENSE_KEY" >&2; exit 1; };
        rm -rf /tmp/burp-rest-api && mkdir -p /tmp/burp-rest-api && cd /tmp/burp-rest-api;
        jar xf /burp/burp-rest-api-2.3.2.jar;
        cp="/burp/burpsuite_pro.jar:/tmp/burp-rest-api/BOOT-INF/classes";
        for jar_file in /tmp/burp-rest-api/BOOT-INF/lib/*.jar; do
          cp="$$cp:$$jar_file";
        done;
        mkdir -p /var/lib/burp;
        fifo="/tmp/burp-bootstrap.fifo";
        rm -f "$$fifo";
        mkfifo "$$fifo";
        {
          sleep 5;
          printf "y\n";
          sleep 2;
          printf "%s\n" "$$BURP_LICENSE_KEY";
          sleep 2;
          printf "o\n";
          sleep infinity;
        } > "$$fifo" &
        fifo_pid=$$!;
        cleanup() {
          kill "$$fifo_pid" >/dev/null 2>&1 || true;
          rm -f "$$fifo";
        };
        trap cleanup EXIT INT TERM;
        java --add-opens=java.desktop/javax.swing=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED -cp "$$cp" com.vmware.burp.extension.BurpApplication --headless.mode=true --server.address=0.0.0.0 --server.port=8090 --data-dir=/var/lib/burp < "$$fifo"
      '
    ports:
      - "${BURP_API_HOST_PORT:-8090}:8090"
    volumes:
      - ./backend/burp:/burp
      - burp_data:/var/lib/burp
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8090/v3/api-docs >/dev/null 2>&1"]
      interval: 20s
      timeout: 8s
      retries: 8

  # ─────────────────────────────────────────────────────────────────
  # Backend API
  # ─────────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pentest_backend
    command: >
      sh -c "alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file: *optional_env_file
    environment:
      APP_ENV: development
      BURP_API_HOST: burp_rest
      BURP_API_PORT: "8090"
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
      burp_rest:
        condition: service_started
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    profiles: ["dev"]
    volumes:
      - ./backend:/app

  # ─────────────────────────────────────────────────────────────────
  # Workers: RECON, OSINT, VULN
  # ─────────────────────────────────────────────────────────────────

  worker_recon:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pentest_worker_recon
    command: celery -A app.workers.celery_app.celery worker -l info -Q scan.unit,scan.scheduled,worker.unit.reconhecimento,worker.scheduled.reconhecimento -n recon@%h
    env_file: *optional_env_file
    environment:
      APP_ENV: development
      WORKER_MODE: unit
      BURP_API_HOST: burp_rest
      BURP_API_PORT: "8090"
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
      burp_rest:
        condition: service_started
    volumes:
      - ./backend:/app
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"
        reservations:
          memory: 1g
          cpus: "1"

  worker_osint:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pentest_worker_osint
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.osint,worker.scheduled.osint -n osint@%h
    env_file: *optional_env_file
    environment:
      APP_ENV: development
      WORKER_MODE: unit
      BURP_API_HOST: burp_rest
      BURP_API_PORT: "8090"
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
      burp_rest:
        condition: service_started
    volumes:
      - ./backend:/app
    deploy:
      resources:
        limits:
          memory: 1.5g
          cpus: "1.5"
        reservations:
          memory: 800m
          cpus: "0.75"

  worker_vuln:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pentest_worker_vuln
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.analise_vulnerabilidade,worker.scheduled.analise_vulnerabilidade -n vuln@%h
    env_file: *optional_env_file
    environment:
      APP_ENV: development
      WORKER_MODE: unit
      BURP_API_HOST: burp_rest
      BURP_API_PORT: "8090"
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
      burp_rest:
        condition: service_started
    volumes:
      - ./backend:/app
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"
        reservations:
          memory: 1g
          cpus: "1"

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pentest_celery_beat
    command: celery -A app.workers.celery_app.celery beat -l info
    env_file: *optional_env_file
    environment:
      APP_ENV: development
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on:
      redis:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./backend:/app

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pentest_flower
    command: celery -A app.workers.celery_app.celery flower --port=5555
    env_file: *optional_env_file
    environment:
      APP_ENV: development
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on:
      redis:
        condition: service_started
      worker_recon:
        condition: service_started
      worker_osint:
        condition: service_started
      worker_vuln:
        condition: service_started
    ports:
      - "${FLOWER_HOST_PORT:-5555}:5555"
    volumes:
      - ./backend:/app

  # ─────────────────────────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pentest_frontend
    environment:
      VITE_API_URL: "${VITE_API_URL:-http://localhost:8001}"
      TZ: America/Sao_Paulo
    depends_on:
      backend:
        condition: service_started
    profiles: ["dev"]
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  ollama_data:
  burp_data:
