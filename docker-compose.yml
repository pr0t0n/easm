x-optional-env-file: &optional_env_file
  - path: ./.env
    required: false

services:
  # ─────────────────────────────────────────────────────────────────
  # Infrastructure: Database, Cache, LLM
  # ─────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: pentest_postgres
    environment:
      POSTGRES_DB: easm
      POSTGRES_USER: easm
      POSTGRES_PASSWORD: easm
      TZ: America/Sao_Paulo
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    profiles: ["dev", "prod"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pentest_redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    profiles: ["dev", "prod"]
    environment:
      TZ: America/Sao_Paulo

  ollama:
    image: ollama/ollama:latest
    container_name: pentest_ollama
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    profiles: ["dev", "prod"]
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 10g
        reservations:
          memory: 8g
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_NUM_GPU: "0"
      TZ: America/Sao_Paulo

  # ─────────────────────────────────────────────────────────────────
  # Backend API
  # ─────────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pentest_backend
    command: >
      sh -c "alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file: *optional_env_file
    environment:
      APP_ENV: development
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    profiles: ["dev"]
    volumes:
      - ./backend:/app

  # ─────────────────────────────────────────────────────────────────
  # Workers: RECON, OSINT, VULN
  # ─────────────────────────────────────────────────────────────────

  worker_recon:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pentest_worker_recon
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.reconhecimento,worker.scheduled.reconhecimento -n recon@%h
    env_file: *optional_env_file
    environment:
      APP_ENV: development
      WORKER_MODE: unit
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./backend:/app

  worker_osint:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pentest_worker_osint
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.osint,worker.scheduled.osint -n osint@%h
    env_file: *optional_env_file
    environment:
      APP_ENV: development
      WORKER_MODE: unit
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./backend:/app

  worker_vuln:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pentest_worker_vuln
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.analise_vulnerabilidade,worker.scheduled.analise_vulnerabilidade -n vuln@%h
    env_file: *optional_env_file
    environment:
      APP_ENV: development
      WORKER_MODE: unit
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./backend:/app

  # ─────────────────────────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pentest_frontend
    environment:
      VITE_API_URL: "${VITE_API_URL:-}"
      TZ: America/Sao_Paulo
    depends_on:
      backend:
        condition: service_started
    profiles: ["dev"]
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  ollama_data:
