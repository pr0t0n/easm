x-optional-env-file: &optional_env_file
  - path: ./.env
    required: false

services:
  # ─────────────────────────────────────────────────────────────────
  # Infrastructure: Database, Cache, LLM
  # ─────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: scriptkiddo_postgres
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-scriptkiddo}"
      POSTGRES_USER: "${POSTGRES_USER:-scriptkiddo}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-scriptkiddo}"
      TZ: America/Sao_Paulo
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    profiles: ["dev", "prod"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scriptkiddo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scriptkiddo_redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    profiles: ["dev", "prod"]
    environment:
      TZ: America/Sao_Paulo

  ollama:
    image: ollama/ollama:latest
    container_name: scriptkiddo_ollama
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    profiles: ["dev", "prod"]
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 10g
        reservations:
          memory: 8g
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_NUM_GPU: "0"
      TZ: America/Sao_Paulo

  # ─────────────────────────────────────────────────────────────────
  # Kali Runner — single source of truth for offensive tools
  # All workers dispatch jobs HERE via HTTP (POST /jobs).
  # ─────────────────────────────────────────────────────────────────

  kali_runner:
    build:
      context: ./kali-runner
      dockerfile: Dockerfile
    container_name: scriptkiddo_kali_runner
    profiles: ["dev", "prod"]
    environment:
      KALI_WORKSPACE: /workspace
      KALI_MAX_PARALLEL: "8"
      TZ: America/Sao_Paulo
    ports:
      - "${KALI_RUNNER_HOST_PORT:-8088}:8088"
    volumes:
      - kali_workspace:/workspace
    cap_add:
      - NET_RAW
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8088/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────
  # Backend API
  # ─────────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scriptkiddo_backend
    command: >
      sh -c "alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file: *optional_env_file
    environment:
      APP_ENV: development
      KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}"
      ENABLE_OBSERVABILITY: "${ENABLE_OBSERVABILITY:-false}"
      ENABLE_AUTO_EVALUATION: "${ENABLE_AUTO_EVALUATION:-false}"
      LANGFUSE_HOST: "${LANGFUSE_HOST:-}"
      LANGFUSE_PUBLIC_KEY: "${LANGFUSE_PUBLIC_KEY:-}"
      LANGFUSE_SECRET_KEY: "${LANGFUSE_SECRET_KEY:-}"
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
      kali_runner:
        condition: service_started
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    profiles: ["dev"]
    volumes:
      - ./backend:/app

  # ─────────────────────────────────────────────────────────────────
  # Cyber Kill Chain workers — all offensive execution happens in kali_runner
  # ─────────────────────────────────────────────────────────────────

  worker_scope:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_scope
    command: celery -A app.workers.celery_app.celery worker -l info -Q scan.unit,scan.scheduled,worker.unit.scope_validation,worker.scheduled.scope_validation -n scope@%h
    env_file: *optional_env_file
    environment: { APP_ENV: development, WORKER_MODE: unit, KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}", TZ: America/Sao_Paulo }
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started } }
    volumes: ["./backend:/app"]

  worker_recon:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_recon
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.reconnaissance,worker.scheduled.reconnaissance,worker.unit.reconhecimento,worker.scheduled.reconhecimento -n recon@%h
    env_file: *optional_env_file
    environment: { APP_ENV: development, WORKER_MODE: unit, KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}", TZ: America/Sao_Paulo }
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started } }
    volumes: ["./backend:/app"]

  worker_weaponization:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_weaponization
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.weaponization,worker.scheduled.weaponization,worker.unit.osint,worker.scheduled.osint -n weaponization@%h
    env_file: *optional_env_file
    environment: { APP_ENV: development, WORKER_MODE: unit, KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}", TZ: America/Sao_Paulo }
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started } }
    volumes: ["./backend:/app"]

  worker_delivery:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_delivery
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.delivery,worker.scheduled.delivery -n delivery@%h
    env_file: *optional_env_file
    environment: { APP_ENV: development, WORKER_MODE: unit, KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}", TZ: America/Sao_Paulo }
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started } }
    volumes: ["./backend:/app"]

  worker_exploitation:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_exploitation
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.exploitation,worker.scheduled.exploitation,worker.unit.analise_vulnerabilidade,worker.scheduled.analise_vulnerabilidade -n exploitation@%h
    env_file: *optional_env_file
    environment: { APP_ENV: development, WORKER_MODE: unit, KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}", TZ: America/Sao_Paulo }
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started } }
    volumes: ["./backend:/app"]

  worker_installation:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_installation
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.installation,worker.scheduled.installation,worker.unit.exploit,worker.scheduled.exploit -n installation@%h
    env_file: *optional_env_file
    environment: { APP_ENV: development, WORKER_MODE: unit, KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}", TZ: America/Sao_Paulo }
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started } }
    volumes: ["./backend:/app"]

  worker_c2:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_c2
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.command_control,worker.scheduled.command_control,worker.unit.api,worker.scheduled.api -n c2@%h
    env_file: *optional_env_file
    environment: { APP_ENV: development, WORKER_MODE: unit, KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}", TZ: America/Sao_Paulo }
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started } }
    volumes: ["./backend:/app"]

  worker_actions:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_actions
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.actions_on_objectives,worker.scheduled.actions_on_objectives,worker.unit.code,worker.scheduled.code -n actions@%h
    env_file: *optional_env_file
    environment: { APP_ENV: development, WORKER_MODE: unit, KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}", TZ: America/Sao_Paulo }
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started } }
    volumes: ["./backend:/app"]

  worker_reporting:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_reporting
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.reporting,worker.scheduled.reporting -n reporting@%h
    env_file: *optional_env_file
    environment: { APP_ENV: development, WORKER_MODE: unit, KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}", TZ: America/Sao_Paulo }
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started } }
    volumes: ["./backend:/app"]

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scriptkiddo_celery_beat
    command: celery -A app.workers.celery_app.celery beat -l info
    env_file: *optional_env_file
    environment:
      APP_ENV: development
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on:
      redis:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./backend:/app

  # ─────────────────────────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scriptkiddo_frontend
    environment:
      VITE_API_URL: "${VITE_API_URL:-http://localhost:8001}"
      TZ: America/Sao_Paulo
    depends_on:
      backend:
        condition: service_started
    profiles: ["dev"]
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  ollama_data:
  kali_workspace:
