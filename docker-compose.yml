x-optional-env-file: &optional_env_file
  - path: ./.env
    required: false

x-vulnerability-catalog-env: &vulnerability_catalog_env
  VULNERABILITY_CATALOG_ENABLED: "${VULNERABILITY_CATALOG_ENABLED:-true}"
  VULNERABILITY_CATALOG_DIR: "${VULNERABILITY_CATALOG_DIR:-/app/skills/vulnerability_testing}"
  VULNERABILITY_CATALOG_SKILLS: "${VULNERABILITY_CATALOG_SKILLS:-account_takeover,api_security,auth_bypass,bola_bfla,business_logic,clickjacking,command_injection,component_memory_corruption,cors_misconfiguration,crypto_storage,csrf,deserialization,graphql,host_header_injection,http_request_smuggling,idor_object_authorization,information_disclosure,jwt_oauth,open_redirect,path_traversal,race_condition,resource_consumption,sqli,sqli_testing,ssrf,ssti,stored_xss_testing,subdomain_takeover,web_cache,xss,xxe}"

services:
  # ─────────────────────────────────────────────────────────────────
  # Infrastructure: Database, Cache, LLM
  # ─────────────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: scriptkiddo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-scriptkiddo}"
      POSTGRES_USER: "${POSTGRES_USER:-scriptkiddo}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-scriptkiddo}"
      TZ: America/Sao_Paulo
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    profiles: ["dev", "prod"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scriptkiddo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scriptkiddo_redis
    restart: unless-stopped
    # Tier 1-F: maxmemory cap prevents OOM crash when tasks/results accumulate.
    # allkeys-lru evicts least-recently-used keys first — safe for Celery broker
    # because visibility_timeout redelivers unacknowledged tasks automatically.
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    profiles: ["dev", "prod"]
    environment:
      TZ: America/Sao_Paulo

  ollama:
    image: ollama/ollama:latest
    container_name: scriptkiddo_ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    profiles: ["dev", "prod"]
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 10g
        reservations:
          memory: 8g
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_NUM_GPU: "0"
      TZ: America/Sao_Paulo

  # ─────────────────────────────────────────────────────────────────
  # MCP Server — Kali-only execution bridge (resolve profile/alias,
  # aplica guardrail, faz proxy de jobs ao kali_runner). O RAG migrou
  # para o backend (pgvector); este serviço NÃO faz mais RAG/conhecimento.
  # ─────────────────────────────────────────────────────────────────

  mcp_server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: scriptkiddo_mcp_server
    restart: unless-stopped
    profiles: ["dev", "prod"]
    environment:
      MCP_PORT: "${MCP_PORT:-3000}"
      KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}"
      TZ: America/Sao_Paulo
    ports:
      - "${MCP_HOST_PORT:-3000}:3000"
    volumes:
      # Source mounted so MCP logic changes (profile resolution, etc.) apply
      # with a container restart — no image rebuild needed.
      - ./mcp-server/mcp_server.py:/app/mcp_server.py:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────
  # Kali Runner — single source of truth for offensive tools
  # All workers dispatch jobs HERE via HTTP (POST /jobs).
  # ─────────────────────────────────────────────────────────────────

  kali_runner:
    build:
      context: ./kali-runner
      dockerfile: Dockerfile
    container_name: scriptkiddo_kali_runner
    restart: unless-stopped
    profiles: ["dev", "prod"]
    environment:
      KALI_WORKSPACE: /workspace
      # 100 saturava o link do operador (derrubava a internet + causava os
      # próprios timeouts). 10 = varredura EDUCADA — o kali é o chokepoint onde
      # TODO tool roda, então este é o cap real de conexões de saída simultâneas.
      KALI_MAX_PARALLEL: "${KALI_MAX_PARALLEL:-16}"
      SHODAN_API_KEY: "${SHODAN_API_KEY:-}"
      SCAN_AUTH_USERNAME: "${SCAN_AUTH_USERNAME:-}"
      SCAN_AUTH_PASSWORD: "${SCAN_AUTH_PASSWORD:-}"
      SCAN_AUTH_USERLIST: "${SCAN_AUTH_USERLIST:-}"
      SCAN_AUTH_PASSLIST: "${SCAN_AUTH_PASSLIST:-}"
      SCAN_AUTH_PROTOCOL: "${SCAN_AUTH_PROTOCOL:-}"
      SCAN_JWT_TOKEN: "${SCAN_JWT_TOKEN:-}"
      SCAN_FUZZ_PARAM: "${SCAN_FUZZ_PARAM:-}"
      SCAN_FUZZ_POST_DATA: "${SCAN_FUZZ_POST_DATA:-}"
      SCAN_FUZZ_CONTENT_TYPE: "${SCAN_FUZZ_CONTENT_TYPE:-application/x-www-form-urlencoded}"
      TZ: America/Sao_Paulo
    ports:
      - "${KALI_RUNNER_HOST_PORT:-8088}:8088"
    volumes:
      - kali_workspace:/workspace
      - evidence_storage:/evidence
      # Persistent store for click-to-install tool modules (Go/pipx/git/binary
      # tools land here and survive restarts; the base image stays lean).
      - kali_tools:/opt/tools
      # Profiles mounted read-only so tuning tool timeouts/rates needs only a
      # container restart (not a full image rebuild). Aligns with the rule:
      # never rebuild kali_runner unnecessarily — it's a stable tool repository.
      - ./kali-runner/profiles:/app/profiles:ro
      # Module manifest mounted read-only so install steps can be tuned without
      # a rebuild (a container restart reloads modules.yaml).
      - ./kali-runner/modules.yaml:/app/modules.yaml:ro
    cap_add:
      - NET_RAW
      - NET_ADMIN
    extra_hosts:
      # Linux hosts don't auto-populate host.docker.internal; this maps it to
      # the docker host so `localhost:3001` from the operator becomes
      # reachable inside the Kali container as host.docker.internal:3001.
      - "host.docker.internal:host-gateway"
    healthcheck:
      # Probe FUNCIONAL: /jobs exercita o store de jobs em memória. Se o kali
      # 'wedgear' (inchaço de jobs → não aceita/lista), /jobs trava e o
      # healthcheck vira unhealthy (o /healthz raso não pegava isso). O watchdog
      # reinicia ao detectar; aqui dá visibilidade na página de Saúde.
      test: ["CMD-SHELL", "curl -fsS --max-time 8 http://127.0.0.1:8088/jobs >/dev/null || curl -fsS --max-time 5 http://127.0.0.1:8088/healthz"]
      interval: 30s
      timeout: 12s
      retries: 4
      start_period: 60s

  evidence_init:
    image: busybox:1.36
    container_name: scriptkiddo_evidence_init
    profiles: ["dev", "prod"]
    restart: "no"
    command: sh -c "mkdir -p /evidence && chmod -R 0777 /evidence"
    volumes:
      - evidence_storage:/evidence

  # ─────────────────────────────────────────────────────────────────
  # Backend API
  # ─────────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scriptkiddo_backend
    restart: unless-stopped
    command: >
      sh -c "alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file: *optional_env_file
    environment:
      <<: *vulnerability_catalog_env
      APP_ENV: development
      KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}"
      MCP_SERVER_URL: "${MCP_SERVER_URL:-http://mcp_server:3000}"
      ZAP_URL: "${ZAP_URL:-http://zap:8090}"
      ZAP_API_KEY: "${ZAP_API_KEY:-scriptkiddo-zap-key}"
      EVIDENCE_STORAGE_PATH: "${EVIDENCE_STORAGE_PATH:-/evidence}"
      BROWSER_RUNNER_URL: "${BROWSER_RUNNER_URL:-http://browser_runner:9222}"
      ENABLE_BROWSER_CAPTURE: "${ENABLE_BROWSER_CAPTURE:-true}"
      BROWSER_CAPTURE_HAR: "${BROWSER_CAPTURE_HAR:-true}"
      BROWSER_CAPTURE_SCREENSHOTS: "${BROWSER_CAPTURE_SCREENSHOTS:-true}"
      BROWSER_MAX_DURATION_SECONDS: "${BROWSER_MAX_DURATION_SECONDS:-180}"
      ENABLE_ARTIFACT_REPLAY: "${ENABLE_ARTIFACT_REPLAY:-true}"
      ENABLE_OOB_VALIDATION: "${ENABLE_OOB_VALIDATION:-false}"
      MCP_RAG_ENABLED: "${MCP_RAG_ENABLED:-true}"
      MCP_EXECUTE_TOOLS_VIA_MCP: "${MCP_EXECUTE_TOOLS_VIA_MCP:-true}"
      ENABLE_OBSERVABILITY: "${ENABLE_OBSERVABILITY:-false}"
      ENABLE_AUTO_EVALUATION: "${ENABLE_AUTO_EVALUATION:-false}"
      LANGFUSE_HOST: "${LANGFUSE_HOST:-}"
      LANGFUSE_PUBLIC_KEY: "${LANGFUSE_PUBLIC_KEY:-}"
      LANGFUSE_SECRET_KEY: "${LANGFUSE_SECRET_KEY:-}"
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
      kali_runner:
        condition: service_started
      mcp_server:
        condition: service_started
      evidence_init:
        condition: service_completed_successfully
      zap:
        condition: service_started
    ports:
      - "${BACKEND_HOST_PORT:-8001}:8000"
    profiles: ["dev"]
    # group_add 0 (root group): permite ao processo non-root (uid 1000) LER o
    # docker.sock (root:root 660) sem virar root — só p/ a visão de saúde.
    group_add: ["0"]
    volumes:
      - ./backend:/app
      - ./skills:/app/skills:ro
      - evidence_storage:/evidence
      # Visão de saúde dos containers (Centro Operacional). Socket read-only:
      # o backend lê status/health/logs via Docker API. Não inicia/para nada.
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ─────────────────────────────────────────────────────────────────
  # Cyber Kill Chain workers — all offensive execution happens in kali_runner
  # ─────────────────────────────────────────────────────────────────

  worker_scope:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_scope
    restart: unless-stopped
    # scan.unit: main scan tasks (run_scan_job_unit + continuations).
    # scan.scheduled: scheduled scan tasks.
    # scan.parallel is intentionally NOT here — it goes to worker_parallel.
    # --pool=threads: safe now that _CURRENT_AUTH_HEADERS uses threading.local().
    command: celery -A app.workers.celery_app.celery worker -l info -Q scan.unit,scan.scheduled,worker.unit.scope_validation,worker.scheduled.scope_validation -n scope@%h --pool=threads --concurrency=16
    env_file: *optional_env_file
    environment: { <<: *vulnerability_catalog_env, APP_ENV: development, WORKER_MODE: unit, KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}", MCP_SERVER_URL: "${MCP_SERVER_URL:-http://mcp_server:3000}", MCP_RAG_ENABLED: "${MCP_RAG_ENABLED:-true}", MCP_EXECUTE_TOOLS_VIA_MCP: "${MCP_EXECUTE_TOOLS_VIA_MCP:-true}", TZ: America/Sao_Paulo }
    profiles: ["dev"]
    # socket Docker (rw) + group root: o watchdog (roda nesta fila) reinicia o
    # kali_runner quando detecta o 'wedge' (Up mas travado).
    group_add: ["0"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started }, mcp_server: { condition: service_started } }
    volumes: ["./backend:/app", "./skills:/app/skills:ro", "evidence_storage:/evidence", "/var/run/docker.sock:/var/run/docker.sock"]

  worker_parallel:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_parallel
    restart: unless-stopped
    # Dedicated worker for per-target subtasks (run_scan_target_subset).
    # Isolated from scan.unit so subtasks never compete with the main scan task.
    # --pool=threads: safe; each thread has its own _AUTH_LOCAL via threading.local().
    # Concurrency reduced to 4: além da conexão HTTP + sessão DB por thread, o
    # onnxruntime (embedding semântico, Frente A) carrega arenas de memória no
    # worker; 8 threads + onnxruntime causava OOM (exit 137). OMP_NUM_THREADS=1
    # mantém o onnxruntime enxuto; mem_limit contém picos.
    # B2 — orquestrador da fila paralela: era o gargalo (concurrency=4 despachava/
    # poll de TODOS os work-items de TODOS os scans). Sobe para 10 (configurável via
    # SCAN_PARALLEL_CONCURRENCY). Os caps reais de kali continuam limitados pelo
    # semáforo global (kali:inflight) + fatia justa por scan, então isto só remove o
    # afunilamento de orquestração sem aumentar a carga real no kali.
    command: celery -A app.workers.celery_app.celery worker -l info -Q scan.parallel -n parallel@%h --pool=threads --concurrency=${SCAN_PARALLEL_CONCURRENCY:-10}
    env_file: *optional_env_file
    environment: { <<: *vulnerability_catalog_env, APP_ENV: development, WORKER_MODE: unit, KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}", MCP_SERVER_URL: "${MCP_SERVER_URL:-http://mcp_server:3000}", MCP_RAG_ENABLED: "${MCP_RAG_ENABLED:-true}", MCP_EXECUTE_TOOLS_VIA_MCP: "${MCP_EXECUTE_TOOLS_VIA_MCP:-true}", TZ: America/Sao_Paulo, OMP_NUM_THREADS: "1", ONNXRUNTIME_INTRA_OP_NUM_THREADS: "1" }
    mem_limit: 5g
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started }, mcp_server: { condition: service_started } }
    volumes: ["./backend:/app", "./skills:/app/skills:ro", "evidence_storage:/evidence"]

  worker_recon:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_recon
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.reconnaissance,worker.scheduled.reconnaissance,worker.unit.reconhecimento,worker.scheduled.reconhecimento -n recon@%h --pool=threads --concurrency=16
    env_file: *optional_env_file
    environment: { <<: *vulnerability_catalog_env, APP_ENV: development, WORKER_MODE: unit, KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}", MCP_SERVER_URL: "${MCP_SERVER_URL:-http://mcp_server:3000}", MCP_RAG_ENABLED: "${MCP_RAG_ENABLED:-true}", MCP_EXECUTE_TOOLS_VIA_MCP: "${MCP_EXECUTE_TOOLS_VIA_MCP:-true}", TZ: America/Sao_Paulo }
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started }, mcp_server: { condition: service_started } }
    volumes: ["./backend:/app", "./skills:/app/skills:ro", "evidence_storage:/evidence"]

  worker_weaponization:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_weaponization
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.weaponization,worker.scheduled.weaponization,worker.unit.osint,worker.scheduled.osint -n weaponization@%h --pool=threads --concurrency=16
    env_file: *optional_env_file
    environment: { <<: *vulnerability_catalog_env, APP_ENV: development, WORKER_MODE: unit, KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}", MCP_SERVER_URL: "${MCP_SERVER_URL:-http://mcp_server:3000}", MCP_RAG_ENABLED: "${MCP_RAG_ENABLED:-true}", MCP_EXECUTE_TOOLS_VIA_MCP: "${MCP_EXECUTE_TOOLS_VIA_MCP:-true}", TZ: America/Sao_Paulo }
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started }, mcp_server: { condition: service_started } }
    volumes: ["./backend:/app", "./skills:/app/skills:ro", "evidence_storage:/evidence"]

  worker_delivery:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_delivery
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.delivery,worker.scheduled.delivery -n delivery@%h --pool=threads --concurrency=16
    env_file: *optional_env_file
    environment: { <<: *vulnerability_catalog_env, APP_ENV: development, WORKER_MODE: unit, KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}", MCP_SERVER_URL: "${MCP_SERVER_URL:-http://mcp_server:3000}", MCP_RAG_ENABLED: "${MCP_RAG_ENABLED:-true}", MCP_EXECUTE_TOOLS_VIA_MCP: "${MCP_EXECUTE_TOOLS_VIA_MCP:-true}", TZ: America/Sao_Paulo }
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started }, mcp_server: { condition: service_started } }
    volumes: ["./backend:/app", "./skills:/app/skills:ro", "evidence_storage:/evidence"]

  worker_exploitation:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_exploitation
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.exploitation,worker.scheduled.exploitation,worker.unit.analise_vulnerabilidade,worker.scheduled.analise_vulnerabilidade -n exploitation@%h --pool=threads --concurrency=16
    env_file: *optional_env_file
    environment: { <<: *vulnerability_catalog_env, APP_ENV: development, WORKER_MODE: unit, KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}", MCP_SERVER_URL: "${MCP_SERVER_URL:-http://mcp_server:3000}", MCP_RAG_ENABLED: "${MCP_RAG_ENABLED:-true}", MCP_EXECUTE_TOOLS_VIA_MCP: "${MCP_EXECUTE_TOOLS_VIA_MCP:-true}", TZ: America/Sao_Paulo }
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started }, mcp_server: { condition: service_started } }
    volumes: ["./backend:/app", "./skills:/app/skills:ro", "evidence_storage:/evidence"]

  worker_installation:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_installation
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.installation,worker.scheduled.installation,worker.unit.exploit,worker.scheduled.exploit -n installation@%h --pool=threads --concurrency=16
    env_file: *optional_env_file
    environment: { <<: *vulnerability_catalog_env, APP_ENV: development, WORKER_MODE: unit, KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}", MCP_SERVER_URL: "${MCP_SERVER_URL:-http://mcp_server:3000}", MCP_RAG_ENABLED: "${MCP_RAG_ENABLED:-true}", MCP_EXECUTE_TOOLS_VIA_MCP: "${MCP_EXECUTE_TOOLS_VIA_MCP:-true}", TZ: America/Sao_Paulo }
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started }, mcp_server: { condition: service_started } }
    volumes: ["./backend:/app", "./skills:/app/skills:ro", "evidence_storage:/evidence"]

  worker_c2:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_c2
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.command_control,worker.scheduled.command_control,worker.unit.api,worker.scheduled.api -n c2@%h --pool=threads --concurrency=16
    env_file: *optional_env_file
    environment: { <<: *vulnerability_catalog_env, APP_ENV: development, WORKER_MODE: unit, KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}", MCP_SERVER_URL: "${MCP_SERVER_URL:-http://mcp_server:3000}", MCP_RAG_ENABLED: "${MCP_RAG_ENABLED:-true}", MCP_EXECUTE_TOOLS_VIA_MCP: "${MCP_EXECUTE_TOOLS_VIA_MCP:-true}", TZ: America/Sao_Paulo }
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started }, mcp_server: { condition: service_started } }
    volumes: ["./backend:/app", "./skills:/app/skills:ro", "evidence_storage:/evidence"]

  worker_actions:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_actions
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.actions_on_objectives,worker.scheduled.actions_on_objectives,worker.unit.code,worker.scheduled.code -n actions@%h --pool=threads --concurrency=16
    env_file: *optional_env_file
    environment: { <<: *vulnerability_catalog_env, APP_ENV: development, WORKER_MODE: unit, KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}", MCP_SERVER_URL: "${MCP_SERVER_URL:-http://mcp_server:3000}", MCP_RAG_ENABLED: "${MCP_RAG_ENABLED:-true}", MCP_EXECUTE_TOOLS_VIA_MCP: "${MCP_EXECUTE_TOOLS_VIA_MCP:-true}", TZ: America/Sao_Paulo }
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started }, mcp_server: { condition: service_started } }
    volumes: ["./backend:/app", "./skills:/app/skills:ro", "evidence_storage:/evidence"]

  worker_reporting:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_reporting
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.reporting,worker.scheduled.reporting -n reporting@%h --pool=threads --concurrency=16
    env_file: *optional_env_file
    environment: { <<: *vulnerability_catalog_env, APP_ENV: development, WORKER_MODE: unit, KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}", MCP_SERVER_URL: "${MCP_SERVER_URL:-http://mcp_server:3000}", MCP_RAG_ENABLED: "${MCP_RAG_ENABLED:-true}", MCP_EXECUTE_TOOLS_VIA_MCP: "${MCP_EXECUTE_TOOLS_VIA_MCP:-true}", TZ: America/Sao_Paulo }
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started }, mcp_server: { condition: service_started } }
    volumes: ["./backend:/app", "./skills:/app/skills:ro", "evidence_storage:/evidence"]

  # ─────────────────────────────────────────────────────────────────
  # Browser + Evidence workers — dynamic SPA capture and proof-pack IO.
  # ─────────────────────────────────────────────────────────────────

  browser_runner:
    image: mcr.microsoft.com/playwright:v1.54.1-noble
    container_name: scriptkiddo_browser_runner
    restart: unless-stopped
    profiles: ["dev", "prod"]
    command: >
      sh -c "npx -y playwright@1.54.1 run-server --host 0.0.0.0 --port 9222"
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "${BROWSER_RUNNER_HOST_PORT:-9222}:9222"
    volumes:
      - browser_traces:/browser-traces
      - evidence_storage:/evidence
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:9222').then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  worker_browser:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_browser
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.browser,worker.scheduled.browser -n browser@%h --pool=threads --concurrency=${BROWSER_WORKER_CONCURRENCY:-4}
    env_file: *optional_env_file
    environment:
      <<: *vulnerability_catalog_env
      APP_ENV: development
      WORKER_MODE: unit
      KALI_RUNNER_URL: "${KALI_RUNNER_URL:-http://kali_runner:8088}"
      MCP_SERVER_URL: "${MCP_SERVER_URL:-http://mcp_server:3000}"
      BROWSER_RUNNER_URL: "${BROWSER_RUNNER_URL:-http://browser_runner:9222}"
      EVIDENCE_STORAGE_PATH: "${EVIDENCE_STORAGE_PATH:-/evidence}"
      ENABLE_BROWSER_CAPTURE: "${ENABLE_BROWSER_CAPTURE:-true}"
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started }, kali_runner: { condition: service_started }, browser_runner: { condition: service_started } }
    volumes: ["./backend:/app", "./skills:/app/skills:ro", "browser_traces:/browser-traces", "evidence_storage:/evidence"]

  worker_evidence:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: scriptkiddo_worker_evidence
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery worker -l info -Q worker.unit.evidence,worker.scheduled.evidence -n evidence@%h --pool=threads --concurrency=${EVIDENCE_WORKER_CONCURRENCY:-4}
    env_file: *optional_env_file
    environment:
      <<: *vulnerability_catalog_env
      APP_ENV: development
      WORKER_MODE: unit
      EVIDENCE_STORAGE_PATH: "${EVIDENCE_STORAGE_PATH:-/evidence}"
      ENABLE_ARTIFACT_REPLAY: "${ENABLE_ARTIFACT_REPLAY:-true}"
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started }, backend: { condition: service_started } }
    volumes: ["./backend:/app", "./skills:/app/skills:ro", "evidence_storage:/evidence"]

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scriptkiddo_celery_beat
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery beat -l info
    env_file: *optional_env_file
    environment:
      <<: *vulnerability_catalog_env
      APP_ENV: development
      MCP_SERVER_URL: "${MCP_SERVER_URL:-http://mcp_server:3000}"
      MCP_RAG_ENABLED: "${MCP_RAG_ENABLED:-true}"
      MCP_EXECUTE_TOOLS_VIA_MCP: "${MCP_EXECUTE_TOOLS_VIA_MCP:-true}"
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on:
      redis:
        condition: service_started
      backend:
        condition: service_started
      mcp_server:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./skills:/app/skills:ro

  # ─────────────────────────────────────────────────────────────────
  # OWASP ZAP — Web Application Scanner
  # Runs in daemon mode; backend calls REST API at :8090
  # Capabilities: passive scan, AJAX spider (SPAs), active scan, OpenAPI scan
  # ─────────────────────────────────────────────────────────────────

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: scriptkiddo_zap
    profiles: ["dev", "prod"]
    # Auto-recuperação: se o ZAP cair (ex.: OOM ao spiderar site JS-pesado),
    # o Docker reinicia sozinho. Antes ficava morto (sem restart policy).
    restart: unless-stopped
    command: >
      zap.sh -daemon
        -host 0.0.0.0
        -port 8090
        -config api.key=${ZAP_API_KEY:-scriptkiddo-zap-key}
        -config api.addrs.addr.name=.*
        -config api.addrs.addr.regex=true
        -config connection.timeoutInSecs=60
        -config scanner.maxScanDurationInMins=30
        -config ajaxSpider.browserId=htmlunit
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "${ZAP_HOST_PORT:-8090}:8090"
    volumes:
      - zap_data:/home/zap/.ZAP
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/JSON/core/view/version/?apikey=${ZAP_API_KEY:-scriptkiddo-zap-key}"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 512m

  # ─────────────────────────────────────────────────────────────────
  # Pentest Automation Lab — optional controlled targets for E2E validation.
  # Start with:
  #   docker compose --profile dev --profile pentest-lab up -d
  # Internal targets for scans:
  #   http://juice_shop:3000
  #   http://dvwa:80
  #   http://idor_api:8080
  # ─────────────────────────────────────────────────────────────────

  juice_shop:
    image: bkimminich/juice-shop:v17.3.0
    container_name: scriptkiddo_lab_juice_shop
    restart: unless-stopped
    profiles: ["pentest-lab"]
    environment:
      NODE_ENV: unsafe
      TZ: America/Sao_Paulo
    ports:
      - "${LAB_JUICE_SHOP_HOST_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 15
      start_period: 60s

  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: scriptkiddo_lab_dvwa
    restart: unless-stopped
    profiles: ["pentest-lab"]
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "${LAB_DVWA_HOST_PORT:-8081}:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/login.php >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 15
      start_period: 60s

  idor_api:
    build:
      context: ./infra/pentest-lab/idor-api
      dockerfile: Dockerfile
    container_name: scriptkiddo_lab_idor_api
    restart: unless-stopped
    profiles: ["pentest-lab"]
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "${LAB_IDOR_API_HOST_PORT:-8082}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: "${FRONTEND_NODE_IMAGE:-node:20-alpine}"
        INSTALL_DEPS: "${FRONTEND_INSTALL_DEPS:-true}"
    container_name: scriptkiddo_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: "${VITE_API_URL:-}"
      TZ: America/Sao_Paulo
    depends_on:
      backend:
        condition: service_started
    profiles: ["dev"]
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  ollama_data:
  kali_workspace:
  kali_tools:
  zap_data:
  evidence_storage:
  browser_traces:
