version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: easm_postgres
    environment:
      POSTGRES_DB: easm
      POSTGRES_USER: easm
      POSTGRES_PASSWORD: easm
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    profiles: ["dev", "prod"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easm -d easm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: easm_redis
    ports:
      - "6379:6379"
    profiles: ["dev", "prod"]
    environment:
      TZ: America/Sao_Paulo

  ollama:
    image: ollama/ollama:latest
    container_name: easm_ollama
    ports:
      - "11434:11434"
    profiles: ["dev", "prod"]
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 10g
        reservations:
          memory: 8g
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_NUM_GPU: "0"
      TZ: America/Sao_Paulo

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_backend
    command: >
      sh -c "alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    ports:
      - "8000:8000"
    profiles: ["dev"]
    volumes:
      - ./backend:/app

  backend_prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_backend_prod
    command: >
      sh -c "alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
    profiles: ["prod"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────────
  # Worker UNITARIO — processa scans manuais/pontuais (POST /api/scans)
  #   Fila principal : scan.unit
  #   Filas de tools : worker.unit.reconhecimento,
  #                    worker.unit.analise_vulnerabilidade,
  #                    worker.unit.osint
  #   Perfil         : alta prioridade, concorrencia paralela
  # ──────────────────────────────────────────────────────────────────────────────
  worker_unit_recon:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_worker_unit_recon
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=INFO
      --autoscale=6,2
      --queues=scan.unit,worker.unit.reconhecimento
      --hostname=worker-unit-recon@%h
    env_file:
      - .env
    environment:
      WORKER_MODE: unit
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./backend:/app

  worker_unit_recon_prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_worker_unit_recon_prod
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=INFO
      --autoscale=6,2
      --queues=scan.unit,worker.unit.reconhecimento
      --hostname=worker-unit-recon-prod@%h
    env_file:
      - .env
    environment:
      WORKER_MODE: unit
      TZ: America/Sao_Paulo
    profiles: ["prod"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend_prod:
        condition: service_started
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────────
  # Worker AGENDADO — processa scans periodicos/batch (ScheduledScan)
  #   Fila principal : scan.scheduled
  #   Filas de tools : worker.scheduled.reconhecimento,
  #                    worker.scheduled.analise_vulnerabilidade,
  #                    worker.scheduled.osint
  #   Perfil         : prioridade normal, concorrencia paralela
  # ──────────────────────────────────────────────────────────────────────────────
  worker_scheduled_recon:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_worker_scheduled_recon
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=INFO
      --autoscale=4,1
      --queues=scan.scheduled,worker.scheduled.reconhecimento
      --hostname=worker-scheduled-recon@%h
    env_file:
      - .env
    environment:
      WORKER_MODE: scheduled
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./backend:/app

  worker_scheduled_recon_prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_worker_scheduled_recon_prod
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=INFO
      --autoscale=4,1
      --queues=scan.scheduled,worker.scheduled.reconhecimento
      --hostname=worker-scheduled-recon-prod@%h
    env_file:
      - .env
    environment:
      WORKER_MODE: scheduled
      TZ: America/Sao_Paulo
    profiles: ["prod"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend_prod:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: easm_frontend
    environment:
      VITE_API_URL: http://localhost:8000
      TZ: America/Sao_Paulo
    depends_on:
      backend:
        condition: service_started
    profiles: ["dev"]
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  worker_unit_vuln:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_worker_unit_vuln
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=INFO
      --autoscale=16,4
      --queues=worker.unit.analise_vulnerabilidade
      --hostname=worker-unit-vuln@%h
    env_file:
      - .env
    environment:
      WORKER_MODE: unit
      EASM_TOOL_EXECUTION_MODE: distributed
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./backend:/app

  worker_scheduled_vuln:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_worker_scheduled_vuln
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=INFO
      --autoscale=20,4
      --queues=worker.scheduled.analise_vulnerabilidade
      --hostname=worker-scheduled-vuln@%h
    env_file:
      - .env
    environment:
      WORKER_MODE: scheduled
      EASM_TOOL_EXECUTION_MODE: distributed
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./backend:/app

  worker_unit_osint:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_worker_unit_osint
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=INFO
      --autoscale=12,2
      --queues=worker.unit.osint
      --hostname=worker-unit-osint@%h
    env_file:
      - .env
    environment:
      WORKER_MODE: unit
      EASM_TOOL_EXECUTION_MODE: distributed
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./backend:/app

  worker_scheduled_osint:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_worker_scheduled_osint
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=INFO
      --autoscale=14,2
      --queues=worker.scheduled.osint
      --hostname=worker-scheduled-osint@%h
    env_file:
      - .env
    environment:
      WORKER_MODE: scheduled
      EASM_TOOL_EXECUTION_MODE: distributed
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./backend:/app

  worker_unit_vuln_prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_worker_unit_vuln_prod
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=INFO
      --autoscale=16,4
      --queues=worker.unit.analise_vulnerabilidade
      --hostname=worker-unit-vuln-prod@%h
    env_file:
      - .env
    environment:
      WORKER_MODE: unit
      EASM_TOOL_EXECUTION_MODE: distributed
      TZ: America/Sao_Paulo
    profiles: ["prod"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend_prod:
        condition: service_started
    restart: unless-stopped

  worker_scheduled_vuln_prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_worker_scheduled_vuln_prod
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=INFO
      --autoscale=20,4
      --queues=worker.scheduled.analise_vulnerabilidade
      --hostname=worker-scheduled-vuln-prod@%h
    env_file:
      - .env
    environment:
      WORKER_MODE: scheduled
      EASM_TOOL_EXECUTION_MODE: distributed
      TZ: America/Sao_Paulo
    profiles: ["prod"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend_prod:
        condition: service_started
    restart: unless-stopped

  worker_unit_osint_prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_worker_unit_osint_prod
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=INFO
      --autoscale=12,2
      --queues=worker.unit.osint
      --hostname=worker-unit-osint-prod@%h
    env_file:
      - .env
    environment:
      WORKER_MODE: unit
      EASM_TOOL_EXECUTION_MODE: distributed
      TZ: America/Sao_Paulo
    profiles: ["prod"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend_prod:
        condition: service_started
    restart: unless-stopped

  worker_scheduled_osint_prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_worker_scheduled_osint_prod
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=INFO
      --autoscale=14,2
      --queues=worker.scheduled.osint
      --hostname=worker-scheduled-osint-prod@%h
    env_file:
      - .env
    environment:
      WORKER_MODE: scheduled
      EASM_TOOL_EXECUTION_MODE: distributed
      TZ: America/Sao_Paulo
    profiles: ["prod"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend_prod:
        condition: service_started
    restart: unless-stopped

  frontend_prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: easm_frontend_prod
    command: ["npm", "run", "preview"]
    environment:
      VITE_API_URL: http://localhost:8000
      TZ: America/Sao_Paulo
    profiles: ["prod"]
    depends_on:
      backend_prod:
        condition: service_started
    ports:
      - "5173:5173"
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────────
  # Celery Beat — dispara scheduler_tick a cada minuto para processar ScheduledScans
  # ──────────────────────────────────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_celery_beat
    command: >
      celery -A app.workers.celery_app.celery beat
      --loglevel=INFO
      --scheduler celery.beat.PersistentScheduler
      --schedule /tmp/celerybeat-schedule
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
    profiles: ["dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./backend:/app

  celery_beat_prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easm_celery_beat_prod
    command: >
      celery -A app.workers.celery_app.celery beat
      --loglevel=INFO
      --scheduler celery.beat.PersistentScheduler
      --schedule /tmp/celerybeat-schedule
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
    profiles: ["prod"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend_prod:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
