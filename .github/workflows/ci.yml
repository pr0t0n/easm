name: CI

# P18 — gate automático na main. Antes os 24+ arquivos de teste existiam
# mas só rodavam à mão; e o time commita direto na main sem rede de proteção.
# Este workflow roda compileall (rápido) + pytest a cada push/PR.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile (fast syntax gate)
        run: python -m compileall -q app

      - name: Run tests
        env:
          LLM_REASONING_ENABLED: "false"
        run: pytest tests -q --durations=15

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Run frontend contract tests
        run: npm test

      - name: Build production bundle
        run: npm run build

  # P22 — prova que todas as migrations aplicam num Postgres pgvector limpo
  # (mesma imagem da compose) e que o downgrade do head é reversível.
  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: scriptkiddo
          POSTGRES_USER: scriptkiddo
          POSTGRES_PASSWORD: scriptkiddo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scriptkiddo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://scriptkiddo:scriptkiddo@localhost:5432/scriptkiddo
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret
      ADMIN_EMAIL: admin@ci.local
      ADMIN_PASSWORD: ci-admin-pass
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Upgrade head (todas as migrations num DB limpo)
        run: alembic -c alembic.ini upgrade head

      - name: Round-trip do head (downgrade -1 e upgrade de volta)
        run: |
          alembic -c alembic.ini downgrade -1
          alembic -c alembic.ini upgrade head
