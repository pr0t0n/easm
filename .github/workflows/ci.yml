name: CI

# P18 — gate automático na main. Antes os 24+ arquivos de teste existiam
# mas só rodavam à mão; e o time commita direto na main sem rede de proteção.
# Este workflow roda compileall (rápido) + pytest a cada push/PR.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile (fast syntax gate)
        run: python -m compileall -q app

      - name: Run tests
        run: pytest tests -q
